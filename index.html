<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<title>Amphi — Cyber-NUM</title>
<style>
:root{
  --bg:#f1f5f9;--card:#fff;--ink:#0f172a;--muted:#64748b;--faint:#94a3b8;--line:#e2e8f0;
  --teal:#0d9488;--teal-l:#ccfbf1;--red:#dc2626;--red-l:#fee2e2;
  --indigo:#4f46e5;--indigo-l:#e0e7ff;
  --sat: env(safe-area-inset-top,0px);
  --sab: env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{
  background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  min-height:100dvh;
  padding-bottom:calc(20px + var(--sab));
}

/* ── HEADER ── */
.hdr{
  background:#0f172a;color:#fff;
  padding:calc(10px + var(--sat)) 14px 0;
  position:sticky;top:0;z-index:99;
}
.hdr-top{
  display:flex;align-items:center;justify-content:space-between;padding-bottom:8px;
}
.hdr-top h1{font-size:16px;font-weight:800}
.hdr-top .sub{font-size:10px;color:#475569;margin-top:1px}
.atabs{display:flex;gap:5px}
.atab{
  flex:1;border:none;border-radius:7px 7px 0 0;padding:7px 2px 9px;
  font-size:11px;font-weight:700;background:#1e293b;color:#475569;cursor:pointer;
}
.atab .cnt{display:block;font-size:10px;font-weight:400;opacity:.7;margin-top:1px}
.atab.on{background:var(--bg);color:var(--ink)}
.atab.reel{background:#2d1212;color:#ef4444}
.atab.reel.on{background:#fef2f2;color:#991b1b}

/* ── WRAP ── */
.wrap{padding:12px 14px 0}

/* ── CANDIDAT ── */
.cbar{
  display:flex;align-items:center;gap:10px;
  background:var(--card);border-radius:12px;padding:10px 13px;margin-bottom:10px;
  box-shadow:0 1px 3px rgba(0,0,0,.07);
}
.cbdg{
  width:36px;height:36px;border-radius:50%;background:#0f172a;color:#fff;
  display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px;flex-shrink:0;
}
.cinfo{flex:1}
.cname{font-weight:800;font-size:14px;line-height:1.2}
.csub{font-size:10px;color:var(--muted);margin-top:1px}
.cprog{flex:1}
.cprog-bar{height:5px;border-radius:99px;background:var(--line);overflow:hidden;margin-bottom:3px}
.cprog-bar i{display:block;height:100%;background:var(--teal);border-radius:99px;transition:width .3s}
.cprog-txt{font-size:10px;color:var(--muted)}
.cdone{font-weight:700;color:var(--teal);font-size:13px}

/* ── HERO ── */
.hero{
  border-radius:14px;padding:14px 16px;margin-bottom:12px;
  display:flex;align-items:center;gap:13px;
  box-shadow:0 2px 10px rgba(13,148,136,.25);
}
.hero.avail{
  background:linear-gradient(120deg,#0f172a 0%,#0c4a6e 60%,#134e4a 100%);
  color:#fff;
}
.hero.none{background:var(--red-l);color:var(--red);box-shadow:none}
.hero.idle{background:var(--card);color:var(--muted);box-shadow:0 1px 3px rgba(0,0,0,.06)}
.hero-icon{font-size:28px;flex-shrink:0;line-height:1}
.hero-body{flex:1;min-width:0}
.hero-label{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;opacity:.6;margin-bottom:3px}
.hero-city{font-size:22px;font-weight:900;line-height:1;letter-spacing:-.3px}
.hero-sub{font-size:11px;opacity:.65;margin-top:3px}
.hero-badge{
  flex-shrink:0;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);
  border-radius:10px;padding:6px 10px;text-align:center;
}
.hero-badge .n{font-size:18px;font-weight:900;line-height:1}
.hero-badge .l{font-size:9px;opacity:.7}
.hero.idle .hero-badge,.hero.none .hero-badge{display:none}

/* ── VOEUX STRIP ── */
.voeux-strip{
  display:flex;gap:7px;overflow-x:auto;padding-bottom:10px;margin-bottom:4px;
  scrollbar-width:none;
}
.voeux-strip::-webkit-scrollbar{display:none}
.vpill{
  flex-shrink:0;border-radius:99px;padding:5px 11px;
  display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700;
  border:1.5px solid transparent;white-space:nowrap;
}
.vpill.best{background:var(--teal);color:#fff;border-color:var(--teal)}
.vpill.ok{background:var(--card);color:var(--ink);border-color:var(--line)}
.vpill.pris{background:#f1f5f9;color:var(--faint);border-color:var(--line);text-decoration:line-through}
.vpill-num{font-size:10px;opacity:.6}

/* ── SECTION TITLE ── */
.stitle{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;
  color:var(--muted);margin:14px 0 8px;display:flex;align-items:center;gap:5px;
}

/* ── TILES ── */
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:4px}
.tile{
  border-radius:13px;padding:9px 3px 8px;text-align:center;
  border:1.5px solid var(--line);background:var(--card);
  cursor:pointer;transition:transform .07s, box-shadow .07s;
  position:relative;box-shadow:0 1px 2px rgba(0,0,0,.05);
}
.tile:active{transform:scale(.91);box-shadow:none}
.tile .tid{font-size:18px;font-weight:900;line-height:1;font-family:ui-monospace,monospace}
.tile .tlb{display:block;font-size:9px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 2px;margin-top:2px}
.tile .tdots{display:flex;justify-content:center;gap:3px;margin-top:6px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--line)}
.dot.on{background:var(--teal)}
/* Spéciaux */
.tile.sp{background:var(--indigo);border-color:#4338ca;color:#fff;box-shadow:0 2px 6px rgba(79,70,229,.3)}
.tile.sp .tid{font-size:10px;height:28px;display:flex;align-items:center;justify-content:center;line-height:1.2}
.tile.sp .tlb{color:rgba(255,255,255,.5)}
.tile.sp .dot.on{background:#a5f3fc}
/* Épuisé */
.tile.full{background:#f1f5f9;border-color:#e2e8f0;color:#cbd5e1;cursor:default;box-shadow:none}
.tile.full .tlb,.tile.full .dot.on{color:#e2e8f0;background:#e2e8f0}
/* Mon vœu */
.tile.wish{border-color:var(--teal);border-width:2px;box-shadow:0 0 0 3px rgba(13,148,136,.12)}
.tile.wish .dot.on{background:var(--teal)}
.tile .wi{position:absolute;top:3px;right:5px;font-size:8px;color:var(--teal);font-weight:900}
/* Best voeu */
.tile.best-tile{border-color:#0d9488;background:linear-gradient(135deg,#f0fdfa,#ccfbf1);border-width:2px}
.tile.best-tile .tid{color:#0f766e}

/* ── ACTIONS ── */
.rowbtns{display:flex;gap:8px;margin:14px 0}
.btn{
  flex:1;border:1.5px solid var(--line);background:var(--card);color:var(--ink);
  border-radius:10px;padding:10px 6px;font-size:12px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:5px;
}
.btn:disabled{opacity:.3}
.btn.red{color:var(--red)}
.btn.confirm{background:var(--red);color:#fff;border-color:var(--red)}

/* ── VOEUX LIST ── */
.vcard{background:var(--card);border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.vrow{
  display:flex;align-items:center;gap:9px;padding:11px 13px;
  border-bottom:1px solid var(--line);position:relative;
}
.vrow:last-child{border-bottom:none}
.vrow.best{background:linear-gradient(90deg,rgba(13,148,136,.06) 0%,transparent 100%)}
.vrow.pris{background:#fafafa}
.bar-l{position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--teal);border-radius:0 3px 3px 0}
.vnum{
  width:24px;height:24px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;
  background:var(--line);color:var(--muted);
}
.vrow.best .vnum{background:var(--teal);color:#fff}
.vrow.pris .vnum{background:#fee2e2;color:#f87171}
.vinfo{flex:1;min-width:0}
.vville{font-size:14px;font-weight:800;line-height:1.2}
.vrow.pris .vville{text-decoration:line-through;color:var(--faint)}
.vdept{font-size:10px;color:var(--muted);margin-top:1px}
.vrow.pris .vdept{color:var(--faint)}
.vstatus{flex-shrink:0;font-size:10px;font-weight:800;text-transform:uppercase;padding:3px 8px;border-radius:99px}
.vstatus.bst{background:var(--teal);color:#fff}
.vstatus.ok{background:var(--teal-l);color:var(--teal)}
.vstatus.pris{background:var(--red-l);color:var(--red)}

/* ── RECAP ── */
.rcrd{background:var(--card);border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.rrow{display:flex;align-items:center;gap:7px;padding:8px 12px;border-bottom:1px solid var(--line)}
.rrow:last-child{border-bottom:none}
.rrow.cur{background:#f0fdfa}
.rnum{width:20px;text-align:right;font-size:11px;color:var(--faint);font-family:monospace;flex-shrink:0}
.rnm{flex:1;font-size:13px;min-width:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.rnm b{font-weight:800}
.rnm span{color:var(--muted)}
.rpill{font-size:11px;font-weight:700;padding:3px 7px;border-radius:6px;background:var(--teal-l);color:#0f766e;font-family:monospace;flex-shrink:0;white-space:nowrap}
.rpill.sp{background:var(--indigo-l);color:var(--indigo)}
.rdash{font-size:12px;color:#e2e8f0;font-family:monospace}
.rdel{border:none;background:none;color:var(--faint);padding:3px 5px;cursor:pointer;font-size:14px;flex-shrink:0}

.foot{text-align:center;font-size:10px;color:var(--faint);margin-top:16px;padding:0 10px}
.warn{font-size:12px;font-weight:700;color:var(--red);background:var(--red-l);border-radius:10px;padding:10px;text-align:center;margin-top:10px}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div>
      <h1>Amphi de choix</h1>
      <div class="sub">Cyber-NUM 2025-2026 · SALMERON Matthieu</div>
    </div>
  </div>
  <div class="atabs" id="amphiTabs"></div>
</div>

<div class="wrap">

  <!-- Candidat en cours -->
  <div id="candBar" style="margin-top:12px"></div>

  <!-- Hero meilleur vœu -->
  <div id="heroCard"></div>

  <!-- Vœux scrollable strip -->
  <div class="stitle">♥ Mes vœux</div>
  <div class="voeux-strip" id="voeuxStrip"></div>

  <!-- Tuiles postes spécifiques -->
  <div class="stitle">★ Postes spécifiques</div>
  <div class="grid" id="gridSpec"></div>

  <!-- Tuiles départements -->
  <div class="stitle">⚲ Départements</div>
  <div class="grid" id="gridDept"></div>

  <!-- Boutons -->
  <div class="rowbtns">
    <button class="btn" id="undoBtn" onclick="undo()">↩ Annuler</button>
    <button class="btn red" id="resetBtn" onclick="resetAmphi()">⟲ Réinitialiser</button>
  </div>

  <!-- Vœux liste détaillée -->
  <div class="stitle">♥ Détail des vœux</div>
  <div class="vcard" id="voeuxList"></div>
  <div id="vwarn"></div>

  <!-- Récap -->
  <div class="stitle">Affectations — <span id="recapAmphi"></span></div>
  <div class="rcrd" id="recapList"></div>

  <div class="foot">Sauvegarde automatique · Saisie des 14 candidats devant vous, arrêt à votre tour (rang 15)</div>
</div>

<script>
// ── DONNÉES ───────────────────────────────────────────────────────
const CANDIDATS=[
  [1,"DAVID","Youenn","18,03"],[2,"MARTY","Nicolas","17,17"],[3,"SCARFO","Aymeric","17,10"],
  [4,"WEIL","Rémi","17,02"],[5,"RUBENS","Miguel","16,77"],[6,"BIOT","Béranger","16,53"],
  [7,"PROST","Jérémy","16,49"],[8,"POMAREDE","Clément","16,47"],[9,"GUYON","Thomas","16,39"],
  [10,"TROALEN","Jordane","16,04"],[11,"PIBOULEAU","Doryan","15,98"],[12,"MAIRE","Théo","15,89"],
  [13,"DOULACHE","Andy","15,85"],[14,"BUDZYNOWSKI","Alexis","15,74"],[15,"SALMERON","Matthieu","15,63"]
].map(c=>({rang:c[0],nom:c[1],prenom:c[2],moy:c[3]}));

const PLACES=[
  {id:"SCRTA",label:"SCRTA",city:"",cap:3,sp:1},
  {id:"SESTI",label:"SESTI DG",city:"",cap:1,sp:1},
  {id:"RSB",label:"RSB",city:"",cap:2,sp:1},
  {id:"CNO",label:"CNO",city:"",cap:2,sp:1},
  {id:"03",label:"Allier",city:"Moulins",cap:2},{id:"07",label:"Ardèche",city:"Privas",cap:1},
  {id:"10",label:"Aube",city:"Troyes",cap:1},{id:"14",label:"Calvados",city:"Caen",cap:1},
  {id:"15",label:"Cantal",city:"Aurillac",cap:1},{id:"17",label:"Charente-Mar.",city:"La Rochelle",cap:1},
  {id:"18",label:"Cher",city:"Bourges",cap:1},{id:"25",label:"Doubs",city:"Besançon",cap:1},
  {id:"28",label:"Eure-et-Loir",city:"Chartres",cap:1},{id:"29",label:"Finistère",city:"Quimper",cap:2},
  {id:"33",label:"Gironde",city:"Bordeaux",cap:1},{id:"38",label:"Isère",city:"Grenoble",cap:1},
  {id:"40",label:"Landes",city:"Mont-de-Marsan",cap:2},{id:"41",label:"Loir-et-Cher",city:"Blois",cap:1},
  {id:"44",label:"Loire-Atl.",city:"Nantes",cap:1},{id:"45",label:"Loiret",city:"Orléans",cap:1},
  {id:"50",label:"Manche",city:"Saint-Lô",cap:1},{id:"52",label:"Haute-Marne",city:"Chaumont",cap:1},
  {id:"53",label:"Mayenne",city:"Laval",cap:1},{id:"54",label:"Meurthe-et-M.",city:"Nancy",cap:1},
  {id:"55",label:"Meuse",city:"Bar-le-Duc",cap:1},{id:"57",label:"Moselle",city:"Metz",cap:2},
  {id:"60",label:"Oise",city:"Beauvais",cap:1},{id:"62",label:"Pas-de-Calais",city:"Arras",cap:2},
  {id:"63",label:"Puy-de-Dôme",city:"Clermont-Ferrand",cap:1},{id:"76",label:"Seine-Mar.",city:"Rouen",cap:1},
  {id:"77",label:"Seine-et-M.",city:"Melun",cap:2},{id:"84",label:"Vaucluse",city:"Avignon",cap:1},
  {id:"85",label:"Vendée",city:"La Roche-sur-Yon",cap:1},{id:"87",label:"Haute-Vienne",city:"Limoges",cap:1},
  {id:"89",label:"Yonne",city:"Auxerre",cap:1},{id:"91",label:"Essonne",city:"Évry",cap:1},
  {id:"94",label:"Val-de-Marne",city:"Créteil",cap:3}
];
const P=Object.fromEntries(PLACES.map(p=>[p.id,p]));

// Vœux de Matthieu — fixes, communs à tous les amphis
const VOEUX=[
  {id:"33",city:"Bordeaux"},
  {id:"40",city:"Mont-de-Marsan"},{id:"40",city:"Mont-de-Marsan"},
  {id:"17",city:"La Rochelle"},
  {id:"44",city:"Nantes"},
  {id:"84",city:"Avignon"},
  {id:"63",city:"Clermont-Ferrand"},
  {id:"85",city:"La Roche-sur-Yon"},
  {id:"62",city:"Arras"},{id:"62",city:"Arras"},
  {id:"45",city:"Orléans"},
  {id:"57",city:"Metz"},{id:"57",city:"Metz"},
  {id:"25",city:"Besançon"},
  {id:"94",city:"Créteil"}
];
const WISH_IDS=new Set(VOEUX.map(v=>v.id));

const AMPHIS=[["blanc1","Blanc 1"],["blanc2","Blanc 2"],["blanc3","Blanc 3"],["reel","Réel"]];
const KEY="amphi-v3";

// ── ÉTAT ──────────────────────────────────────────────────────────
let S={choix:{blanc1:{},blanc2:{},blanc3:{},reel:{}}};
let amphi="blanc1", confirmReset=false;
try{const v=localStorage.getItem(KEY);if(v)S=JSON.parse(v);}catch(e){}
const save=()=>{try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){}};

// ── HELPERS ───────────────────────────────────────────────────────
const AHEAD=CANDIDATS.filter(c=>c.rang<=14); // les 14 devant Matthieu
const ME=CANDIDATS[14];                       // rang 15 = SALMERON
const ch=()=>S.choix[amphi]||{};
const reste=id=>P[id].cap-Object.values(ch()).filter(v=>v===id).length;
const courant=()=>AHEAD.find(c=>ch()[c.rang]===undefined)||null;
const esc=s=>String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;");

function voeuDispo(i){
  const id=VOEUX[i].id;
  const prev=VOEUX.slice(0,i).filter(v=>v.id===id).length;
  const pris=Object.values(ch()).filter(v=>v===id).length;
  return (P[id].cap-pris)>prev;
}
function meilleur(){for(let i=0;i<VOEUX.length;i++)if(voeuDispo(i))return i;return -1;}
function tdots(cap,r){
  let h='<div class="tdots">';
  for(let i=0;i<cap;i++)h+=`<span class="dot${i<r?' on':''}"></span>`;
  return h+'</div>';
}

// ── ACTIONS ───────────────────────────────────────────────────────
function choisir(id){
  const c=courant();if(!c||reste(id)<=0)return;
  S.choix[amphi][c.rang]=id;save();render();
}
function retirer(r){delete S.choix[amphi][r];save();render();}
function undo(){const ks=Object.keys(ch()).map(Number);if(ks.length)retirer(Math.max(...ks));}
function resetAmphi(){
  if(!confirmReset){confirmReset=true;render();return;}
  S.choix[amphi]={};confirmReset=false;save();render();
}
function setAmphi(a){amphi=a;confirmReset=false;render();}

// ── RENDER ────────────────────────────────────────────────────────
function render(){
  const cur=courant(), n=Object.keys(ch()).length, best=meilleur();

  // Onglets amphis
  document.getElementById('amphiTabs').innerHTML=AMPHIS.map(([id,lb])=>{
    const cnt=Object.keys(S.choix[id]||{}).length;
    const on=amphi===id, isReel=id==='reel';
    return `<button class="atab${on?' on':''}${isReel?' reel':''}" onclick="setAmphi('${id}')">
      ${lb}<span class="cnt">${cnt}/15</span></button>`;
  }).join('');

  // Candidat bar
  document.getElementById('candBar').innerHTML=cur
    ?`<div class="cbar">
        <div class="cbdg">${cur.rang}</div>
        <div class="cinfo">
          <div class="cname">${cur.nom} ${cur.prenom}</div>
          <div class="csub">Moy. ${cur.moy} · Vœu n°${best>=0?best+1:'—'} disponible</div>
        </div>
        <div class="cprog">
          <div class="cprog-bar"><i style="width:${n/14*100}%"></i></div>
          <div class="cprog-txt">${n}/14 avant vous</div>
        </div>
      </div>`
    :`<div class="cbar">
        <div class="cbdg" style="background:var(--teal)">15</div>
        <div class="cinfo">
          <div class="cname">SALMERON Matthieu — c'est votre tour !</div>
          <div class="csub">Les 14 candidats devant vous ont choisi</div>
        </div>
      </div>`;

  // Hero
  let hero='';
  const monTour = !cur; // les 14 devant ont choisi
  if(best===-1){
    hero=`<div class="hero none">
      <div class="hero-icon">⚠️</div>
      <div class="hero-body"><div class="hero-label">${monTour?'Votre tour':'Attention'}</div>
      <div class="hero-city">Tous vos vœux sont pris</div>
      <div class="hero-sub">Voir les places restantes ci-dessous</div></div>
    </div>`;
  } else if(n===0){
    hero=`<div class="hero idle">
      <div class="hero-icon">⏳</div>
      <div class="hero-body"><div class="hero-label">En attente</div>
      <div class="hero-city" style="font-size:16px;color:var(--muted)">Saisissez les choix ci-dessous</div></div>
    </div>`;
  } else {
    const v=VOEUX[best],p=P[v.id],r=reste(v.id);
    const prev=VOEUX.slice(0,best).filter(x=>x.id===v.id).length;
    const multi=p.cap>1?` · Place ${prev+1}/${p.cap}`:'';
    hero=`<div class="hero avail"${monTour?' style="box-shadow:0 4px 22px rgba(13,148,136,.5)"':''}>
      <div class="hero-icon">${monTour?'🎉':'🎯'}</div>
      <div class="hero-body">
        <div class="hero-label">${monTour?'À vous — choisissez :':'Meilleur choix disponible'}</div>
        <div class="hero-city">${esc(v.city)}</div>
        <div class="hero-sub">Dép. ${p.id} · ${esc(p.label)}${multi}</div>
      </div>
      <div class="hero-badge">
        <div class="n">${r}</div>
        <div class="l">place${r>1?'s':''}</div>
      </div>
    </div>`;
  }
  document.getElementById('heroCard').innerHTML=hero;

  // Vœux strip (pills horizontaux)
  document.getElementById('voeuxStrip').innerHTML=VOEUX.map((v,i)=>{
    const dispo=voeuDispo(i),isBest=i===best;
    const cls=isBest?'best':dispo?'ok':'pris';
    return `<div class="vpill ${cls}">
      <span class="vpill-num">${i+1}</span>
      ${esc(v.city)}
    </div>`;
  }).join('');

  // Tuiles
  const tile=p=>{
    const r=reste(p.id),full=r<=0;
    const wish=WISH_IDS.has(p.id)&&!p.sp;
    const isBest=best>=0&&VOEUX[best].id===p.id&&!p.sp;
    let cls='tile';
    if(p.sp) cls+=' sp';
    if(full) cls+=' full';
    else if(isBest) cls+=' best-tile';
    else if(wish) cls+=' wish';
    return `<button class="${cls}" ${full||!cur?'disabled':''} onclick="choisir('${p.id}')">
      ${wish&&!full?'<span class="wi">♥</span>':''}
      <div class="tid">${p.sp?p.label:p.id}</div>
      ${!p.sp?`<div class="tlb">${esc(p.city||p.label)}</div>`:''}
      ${tdots(p.cap,r)}</button>`;
  };
  document.getElementById('gridSpec').innerHTML=PLACES.filter(p=>p.sp).map(tile).join('');
  document.getElementById('gridDept').innerHTML=PLACES.filter(p=>!p.sp).map(tile).join('');

  // Boutons
  document.getElementById('undoBtn').disabled=n===0;
  const rb=document.getElementById('resetBtn');
  rb.disabled=n===0&&!confirmReset;
  rb.className='btn'+(confirmReset?' confirm':' red');
  rb.textContent=confirmReset?'Confirmer ?':'⟲ Réinitialiser';

  // Vœux liste
  document.getElementById('voeuxList').innerHTML=VOEUX.map((v,i)=>{
    const dispo=voeuDispo(i),isBest=i===best;
    const p=P[v.id],r=reste(v.id);
    const prev=VOEUX.slice(0,i).filter(x=>x.id===v.id).length;
    let badge='';
    if(isBest) badge='<span class="vstatus bst">→ À choisir</span>';
    else if(!dispo) badge='<span class="vstatus pris">Pris</span>';
    else{const s=r-prev;badge=`<span class="vstatus ok">${s} dispo</span>`;}
    const slot=p.cap>1?`<span style="color:var(--faint);font-size:10px"> ${prev+1}/${p.cap}</span>`:'';
    return `<div class="vrow${isBest?' best':!dispo?' pris':''}">
      ${isBest?'<div class="bar-l"></div>':''}
      <div class="vnum">${i+1}</div>
      <div class="vinfo">
        <div class="vville">${esc(v.city)}${slot}</div>
        <div class="vdept">Dép. ${p.id} · ${esc(p.label)}</div>
      </div>
      ${badge}
    </div>`;
  }).join('');

  document.getElementById('vwarn').innerHTML=
    (best===-1&&n>0)?'<div class="warn">⚠ Tous vos vœux ont été pris dans cet amphi</div>':'';

  // Récap
  document.getElementById('recapAmphi').textContent=AMPHIS.find(a=>a[0]===amphi)[1];
  document.getElementById('recapList').innerHTML=CANDIDATS.map(c=>{
    // Ligne spéciale pour Matthieu (rang 15) : on affiche sa meilleure option, pas une saisie
    if(c.rang===15){
      let pill;
      if(best>=0){
        const v=VOEUX[best];
        pill=`<span class="rpill" style="background:var(--teal);color:#fff">★ ${esc(v.city)}</span>`;
      } else if(n>0){
        pill=`<span class="rpill" style="background:var(--red-l);color:var(--red)">vœux épuisés</span>`;
      } else {
        pill=`<span class="rdash">→</span>`;
      }
      return `<div class="rrow cur" style="border-top:2px solid var(--teal)">
        <span class="rnum" style="color:var(--teal);font-weight:800">15</span>
        <span class="rnm"><b>${c.nom}</b> <span>${c.prenom}</span> <span style="color:var(--teal);font-weight:700">(vous)</span></span>
        ${pill}
      </div>`;
    }
    const pid=ch()[c.rang],enCours=cur&&cur.rang===c.rang;
    return `<div class="rrow${enCours?' cur':''}">
      <span class="rnum">${c.rang}</span>
      <span class="rnm"><b>${c.nom}</b> <span>${c.prenom}</span></span>
      ${pid
        ?`<span class="rpill${P[pid].sp?' sp':''}">${P[pid].sp?P[pid].label:pid+' '+esc(P[pid].city||P[pid].label)}</span>
          <button class="rdel" onclick="retirer(${c.rang})">✕</button>`
        :`<span class="rdash">${enCours?'→':'—'}</span>`}
    </div>`;
  }).join('');
}
render();
</script>
</body>
</html>
